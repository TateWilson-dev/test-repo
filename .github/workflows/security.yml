name: security

on:
  pull_request:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        run: >
          docker run --rm -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:latest git /repo
          --redact --no-banner --exit-code 1
